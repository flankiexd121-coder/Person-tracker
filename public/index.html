<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title id="pageTitle">Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    @keyframes bounceIn { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }

    html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a0a0f; color:#f0f0f5; overflow:hidden; }

    /* SIDE-BY-SIDE LAYOUT */
    .app-layout { display:flex; height:100vh; width:100vw; }
    .map-panel { flex:1; min-width:0; position:relative; }
    .map-panel #map { width:100%; height:100%; }
    .ui-panel { width:420px; max-width:90vw; display:flex; flex-direction:column; background:#0d0d14; border-left:1px solid rgba(255,255,255,0.05); overflow:hidden; }

    .ui-header { padding:16px 20px 8px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .ui-header h1 { font-size:20px; font-weight:700; background:linear-gradient(135deg,#f0f0f5,#007aff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .lang-select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#f0f0f5; padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer; outline:none; }

    .ui-content { flex:1; overflow-y:auto; padding:0 16px 16px; }
    .ui-content::-webkit-scrollbar { width:4px; }
    .ui-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }

    .row { display:flex; gap:8px; margin:8px 0; }
    .row input { flex:1; padding:10px 14px; border:1px solid rgba(255,255,255,0.08); border-radius:10px; font-size:14px; background:rgba(255,255,255,0.04); color:#f0f0f5; outline:none; transition:all 0.2s; }
    .row input:focus { border-color:#007aff; background:rgba(0,122,255,0.06); }
    .row input::placeholder { color:rgba(255,255,255,0.2); }
    .row button { padding:10px 16px; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .row button:active { transform:scale(0.96); }
    .btn-primary { background:linear-gradient(135deg,#007aff,#5856d6); color:white; box-shadow:0 4px 15px rgba(0,122,255,0.25); }
    .btn-sm { padding:6px 12px; font-size:12px; }

    .tabs { display:flex; gap:3px; margin:10px 0; background:rgba(255,255,255,0.03); border-radius:10px; padding:3px; }
    .tab { flex:1; text-align:center; padding:8px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; color:rgba(255,255,255,0.35); transition:all 0.3s; }
    .tab.active { background:rgba(0,122,255,0.12); color:#007aff; font-weight:600; }

    .card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:14px; margin:8px 0; animation:fadeIn 0.3s ease; }
    .link-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03); animation:fadeIn 0.3s ease; }
    .link-item:last-child { border-bottom:none; }
    .link-label { font-weight:600; font-size:13px; display:flex; align-items:center; gap:8px; }
    .link-url { font-size:10px; color:rgba(255,255,255,0.25); word-break:break-all; margin-top:2px; }
    .link-status { font-size:11px; margin-top:4px; color:rgba(255,255,255,0.4); }
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; animation:pulse 2s infinite; flex-shrink:0; }
    .zone-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); animation:fadeIn 0.3s ease; }
    .zone-item:last-child { border-bottom:none; }
    .zone-item span { font-size:13px; }
    .event-item { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:12px; animation:fadeIn 0.3s ease; }
    .event-item:last-child { border-bottom:none; }
    .event-enter { color:#34c759; }
    .event-exit { color:#ff3b30; }
    .tag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:500; margin-right:4px; background:rgba(52,199,89,0.1); color:#34c759; border:1px solid rgba(52,199,89,0.15); }

    .actions { display:flex; gap:4px; }
    .copy-btn, .share-btn { border:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; transition:all 0.2s; }
    .copy-btn { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); }
    .share-btn { background:rgba(0,122,255,0.12); color:#007aff; }
    .dlt-btn { background:none; border:none; color:rgba(255,255,255,0.15); font-size:18px; cursor:pointer; padding:2px; }

    .empty-state { color:rgba(255,255,255,0.15); text-align:center; padding:24px 0; font-size:13px; }

    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(30,30,40,0.95); backdrop-filter:blur(20px); color:white; padding:12px 24px; border-radius:12px; font-size:13px; opacity:0; transition:opacity 0.4s,transform 0.4s; pointer-events:none; z-index:9999; border:1px solid rgba(255,255,255,0.06); white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .notif-badge { position:fixed; top:12px; right:12px; background:#ff3b30; color:white; border-radius:50%; min-width:22px; height:22px; font-size:11px; font-weight:700; display:none; align-items:center; justify-content:center; z-index:1000; padding:0 6px; box-shadow:0 4px 15px rgba(255,59,48,0.3); animation:bounceIn 0.3s ease; }
    .slider-group { display:flex; align-items:center; gap:10px; margin-top:6px; }
    .slider-group span { font-size:12px; color:rgba(255,255,255,0.4); min-width:45px; }
    input[type="range"] { -webkit-appearance:none; flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.08); outline:none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#007aff; cursor:pointer; box-shadow:0 2px 8px rgba(0,122,255,0.3); }
    .hint { font-size:12px; color:rgba(255,255,255,0.25); margin-bottom:8px; }

    /* Search bar overlay */
    .search-container { position:absolute; top:12px; left:12px; right:60px; z-index:1000; }
    .search-row { display:flex; gap:6px; }
    .search-row input { flex:1; padding:10px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:10px; font-size:14px;
      background:rgba(20,20,30,0.9); backdrop-filter:blur(15px); color:#f0f0f5; outline:none; transition:all 0.2s; }
    .search-row input:focus { border-color:#007aff; }
    .search-row input::placeholder { color:rgba(255,255,255,0.3); }
    .search-row button { padding:10px 14px; border:none; border-radius:10px; background:rgba(0,122,255,0.2); color:#007aff;
      font-size:16px; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(15px); }
    .search-row button:hover { background:rgba(0,122,255,0.35); }
    .search-results { position:absolute; top:100%; left:0; right:0; margin-top:4px; background:rgba(20,20,30,0.95);
      backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; display:none; max-height:200px; overflow-y:auto; }
    .search-results div { padding:10px 14px; font-size:13px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.03);
      transition:background 0.15s; }
    .search-results div:last-child { border-bottom:none; }
    .search-results div:hover { background:rgba(0,122,255,0.1); }
    .search-results.show { display:block; animation:fadeIn 0.15s ease; }

    @media(max-width:768px) {
      .app-layout { flex-direction:column; }
      .map-panel { height:40vh; flex:none; }
      .ui-panel { width:100%; max-width:100%; border-left:none; border-top:1px solid rgba(255,255,255,0.05); }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="map-panel">
      <div class="search-container">
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search city..." autocomplete="off" />
          <button onclick="searchPlace()">🔍</button>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
      <div id="map"></div>
    </div>
    <div class="ui-panel">
      <div class="ui-header">
        <h1 id="title">Tracker</h1>
        <select class="lang-select" id="langSelect" onchange="setLang(this.value)">

          <option value="es">Español</option>

          <option value="tr">Türkçe</option>

          <option value="sv">Svenska</option>
          <option value="da">Dansk</option>
          <option value="fi">Suomi</option>
          <option value="nb">Norsk</option>
          <option value="ko">한국어</option>
          <option value="hi">हिन्दी</option>
          <option value="th">ไทย</option>
          <option value="vi">Tiếng Việt</option>
          <option value="ro">Română</option>
          <option value="cs">Čeština</option>
          <option value="el">Ελληνικά</option>
          <option value="hu">Magyar</option>
        </select>
      </div>
      <div class="ui-content">
        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="people" id="tabLblPeople">People</div>
          <div class="tab" data-tab="zones" id="tabLblZones">Zones</div>
          <div class="tab" data-tab="events" id="tabLblActivity">Activity</div>
        </div>

        <div id="tab-people">
          <div class="card">
            <div class="row">
              <input type="text" id="labelInput" placeholder="Name (Mom, John...)" />
              <button class="btn-primary" onclick="createLink()" id="btnAddLink">+ Link</button>
            </div>
          </div>
          <div class="card" id="linksContainer"><div class="empty-state" id="emptyLinks">No links yet</div></div>
        </div>

        <div id="tab-zones" style="display:none">
          <div class="card">
            <div class="hint" id="zoneHint">Click the map to place a zone</div>
            <div class="row">
              <input type="text" id="zoneNameInput" placeholder="Zone name (Home, Work...)" />
              <button class="btn-primary" onclick="createZone()" id="btnAddZone">+ Zone</button>
            </div>
            <div class="slider-group">
              <span id="lblRadius">Radius</span>
              <input type="range" id="zoneRadius" min="20" max="500" value="100" oninput="document.getElementById('zrDisplay').textContent=this.value+'m'">
              <span id="zrDisplay" style="min-width:40px;text-align:right">100m</span>
            </div>
            <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:6px;text-align:center" id="zoneCoords"></div>
          </div>
          <div class="card" id="zonesContainer"><div class="empty-state" id="emptyZones">No zones yet</div></div>
        </div>

        <div id="tab-events" style="display:none">
          <div class="card" id="eventsContainer"><div class="empty-state" id="emptyEvents">No activity yet</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="notif-badge" id="notifBadge">0</div>

    let currentLang = localStorage.getItem('trackerLang') || navigator.language.slice(0,2) || 'en';
    if (!L[currentLang]) currentLang = 'en';

    function t(key) {
      return L[currentLang]?.[key] || L['en'][key] || key;
    }

    function setLang(code) {
      currentLang = code;
      localStorage.setItem('trackerLang', code);
      document.documentElement.lang = code;
      if (code === 'ar' || code === 'he') document.body.dir = 'rtl';
      else document.body.dir = 'ltr';
      applyLang();
    }

    function applyLang() {
      const map = {
        title:'title', tabLblPeople:'tabPeople', tabLblZones:'tabZones', tabLblActivity:'tabActivity',
        labelInput:'namePlaceholder', btnAddLink:'btnAddLink', emptyLinks:'emptyLinks',
        zoneHint:'zoneHint', zoneNameInput:'zonePlaceholder', btnAddZone:'btnAddZone',
        lblRadius:'lblRadius', emptyZones:'emptyZones', emptyEvents:'emptyEvents'
      };
      for (const [elId, key] of Object.entries(map)) {
        const el = document.getElementById(elId);
        if (el && el.tagName === 'INPUT') el.placeholder = t(key);
        else if (el) el.textContent = t(key);
      }
    }

    document.getElementById('langSelect').value = currentLang;

    // ====== MAP ======
    const map = L.map('map', { tap: false, zoomControl: false }).setView([40, -100], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> | CARTO'
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const colors = ['#007aff','#34c759','#ff9500','#ff2d55','#5856d6','#ff6482','#30d158','#64d2ff','#ffd60a','#bf5af2'];
    const markers = {};
    const zoneCircles = {};
    let pendingZonePos = null;
    let eventCount = 0;

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
        document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
        if (tab.dataset.tab === 'events') {
          document.getElementById('notifBadge').style.display = 'none';
          eventCount = 0;
        }
      });
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    map.on('click', (e) => {
      document.querySelector('.tab[data-tab="zones"]').click();
      pendingZonePos = e.latlng;
      document.getElementById('zoneCoords').textContent =
        `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
    });

    async function createLink() {
      const label = document.getElementById('labelInput').value.trim() || 'Untitled';
      const res = await fetch('/api/create-link', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({label})
      });
      const data = await res.json();
      document.getElementById('labelInput').value = '';
      showToast(t('linkCreated'));
      loadLinks();
      if (navigator.share && data.url) {
        try { await navigator.share({title:'Share location',text:'Open this to share your location with me',url:data.url}); } catch(_) {}
      }
    }

    async function createZone() {
      const name = document.getElementById('zoneNameInput').value.trim();
      if (!name || !pendingZonePos) { showToast(t('clickMapName')); return; }
      const radius = parseInt(document.getElementById('zoneRadius').value);
      await fetch('/api/zones', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, lat: pendingZonePos.lat, lng: pendingZonePos.lng, radius})
      });
      showToast(t('zoneCreated'));
      document.getElementById('zoneNameInput').value = '';
      document.getElementById('zoneCoords').textContent = '';
      pendingZonePos = null;
      loadZones();
    }

    async function deleteZone(id) {
      if (!confirm(t('zoneDelete'))) return;
      await fetch('/api/zones/' + id, {method:'DELETE'});
      if (zoneCircles[id]) { map.removeLayer(zoneCircles[id]); delete zoneCircles[id]; }
      loadZones();
    }

    async function deleteLink(id) {
      if (!confirm(t('linkDelete'))) return;
      await fetch('/api/links/' + id, {method:'DELETE'});
      if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
      loadLinks();
    }

    function copyLink(url) {
      if (navigator.clipboard) { navigator.clipboard.writeText(url); showToast(t('linkCopied')); }
    }

    function shareLink(url) {
      if (navigator.share) { navigator.share({title:'Share location',text:'Open this to share your location',url}); }
      else { copyLink(url); }
    }

    let searchTimeout;
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const q = searchInput.value.trim();
      if (q.length < 2) { document.getElementById('searchResults').classList.remove('show'); return; }
      searchTimeout = setTimeout(() => searchPlace(q), 400);
    });
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchPlace(); });

    async function searchPlace(query) {
      const q = query || searchInput.value.trim();
      if (q.length < 2) return;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`);
        const data = await res.json();
        const box = document.getElementById('searchResults');
        box.innerHTML = '';
        if (data.length === 0) { box.innerHTML = '<div style="color:rgba(255,255,255,0.3)">No results</div>'; box.classList.add('show'); return; }
        data.forEach(p => {
          const d = document.createElement('div');
          d.textContent = p.display_name.split(', ').slice(0,3).join(', ');
          d.addEventListener('click', () => {
            searchInput.value = d.textContent;
            box.classList.remove('show');
            map.flyTo([parseFloat(p.lat), parseFloat(p.lon)], 13);
            L.circleMarker([parseFloat(p.lat), parseFloat(p.lon)], {
              radius: 8, color: '#007aff', fillColor: '#007aff', fillOpacity: 0.5, weight: 2
            }).addTo(map).bindPopup(`<b>${d.textContent}</b>`).openPopup();
          });
          box.appendChild(d);
        });
        box.classList.add('show');
      } catch (e) { console.error(e); }
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) document.getElementById('searchResults').classList.remove('show');
    });

    async function loadLinks() {
      const res = await fetch('/api/links');
      const links = await res.json();
      const container = document.getElementById('linksContainer');
      if (links.length === 0) { container.innerHTML = `<div class="empty-state">${t('emptyLinks')}</div>`; return; }
      container.innerHTML = links.map((link,i) => {
        const color = colors[i%colors.length];
        const zonesHere = (link.insideZones||[]).map(zid => { const z=window._zones?.find(zz=>zz.id===zid); return z?`<span class="tag">${z.name}</span>`:''; }).join('');
        const isLive = link.latest && (Date.now()-new Date(link.latest.timestamp).getTime()<60000);
        const status = link.latest
          ? `<span class="link-status">${isLive?'<span style="color:#34c759">●</span>':'<span style="color:rgba(255,255,255,0.15)">○</span>'} ${link.latest.name} · ${new Date(link.latest.timestamp).toLocaleTimeString()} ${zonesHere}</span>`
          : `<span class="link-status">${t('waiting')}</span>`;
        return `<div class="link-item">
          <div style="flex:1;min-width:0">
            <div class="link-label"><span class="status-dot" style="background:${color}"></span>${link.label}</div>
            <div class="link-url">${window.location.origin}/track/${link.id}</div>
            <div>${status}</div>
          </div>
          <div class="actions">
            <button class="copy-btn" onclick="copyLink('${window.location.origin}/track/${link.id}')">Copy</button>
            <button class="share-btn" onclick="shareLink('${window.location.origin}/track/${link.id}')">Share</button>
            <button class="dlt-btn" onclick="deleteLink('${link.id}')">×</button>
          </div>
        </div>`;
      }).join('');
    }

    async function loadZones() {
      const res = await fetch('/api/zones');
      const zones = await res.json();
      window._zones = zones;
      Object.values(zoneCircles).forEach(c => map.removeLayer(c));
      Object.keys(zoneCircles).forEach(k => delete zoneCircles[k]);
      zones.forEach(z => {
        const circle = L.circle([z.lat,z.lng], { radius:z.radius, color:'rgba(0,122,255,0.4)', fillColor:'rgba(0,122,255,0.08)', fillOpacity:1, weight:2 }).addTo(map);
        circle.bindPopup(`<b style="color:#fff">${z.name}</b><br><span style="color:rgba(255,255,255,0.5)">${z.radius}m</span>`);
        L.marker([z.lat,z.lng], { icon:L.divIcon({html:`<div style="background:rgba(0,122,255,0.15);color:#007aff;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600;white-space:nowrap;backdrop-filter:blur(10px);border:1px solid rgba(0,122,255,0.2)">${z.name}</div>`,className:'',iconSize:[0,0]}) }).addTo(map);
        zoneCircles[z.id] = circle;
      });
      const container = document.getElementById('zonesContainer');
      if (zones.length===0) { container.innerHTML = `<div class="empty-state">${t('emptyZones')}</div>`; return; }
      container.innerHTML = zones.map(z => `<div class="zone-item"><div><span style="font-weight:600">${z.name}</span><br><span style="font-size:11px;color:rgba(255,255,255,0.25)">${z.lat.toFixed(5)}, ${z.lng.toFixed(5)} · ${z.radius}m</span></div><button class="dlt-btn" onclick="deleteZone('${z.id}')">×</button></div>`).join('');
    }

    async function loadEvents() {
      const res = await fetch('/api/events');
      const events = await res.json();
      const container = document.getElementById('eventsContainer');
      if (events.length===0) { container.innerHTML = `<div class="empty-state">${t('emptyEvents')}</div>`; return; }
      const newEvents = events.filter(e => e.timestamp>(window._lastEventTime||'0'));
      if (newEvents.length>0) {
        eventCount += newEvents.length;
        const badge = document.getElementById('notifBadge');
        badge.textContent = eventCount; badge.style.display = 'flex';
        const latest = newEvents[0];
        showToast(`${latest.type==='enter'?t('toastEnter'):t('toastExit')} ${latest.personName} ${latest.type==='enter'?t('entered'):t('left')} "${latest.zoneName}"`);
        if ('Notification' in window && Notification.permission==='granted')
          new Notification('Tracker', { body:`${latest.personName} ${latest.type==='enter'?t('notifEnter'):t('notifLeft')} ${latest.zoneName}` });
      }
      window._lastEventTime = events[0]?.timestamp;
      container.innerHTML = events.map(e => `<div class="event-item ${e.type==='enter'?'event-enter':'event-exit'}"><strong>${e.type==='enter'?'📍 ':'🚶 '}${e.personName}</strong> ${e.type==='enter'?t('entered'):t('left')} <strong>${e.zoneName}</strong><br><span style="color:rgba(255,255,255,0.15);font-size:10px">${new Date(e.timestamp).toLocaleString()}</span></div>`).join('');
    }

    async function fetchLocations() {
      const res = await fetch('/api/links');
      const links = await res.json();
      const allPoints = [];
      links.forEach((link,i) => {
        if (!link.latest) return;
        const color = colors[i%colors.length];
        const zonesHere = (link.insideZones||[]).map(zid => { const z=window._zones?.find(zz=>zz.id===zid); return z?z.name:''; }).filter(Boolean).join(', ');
        const popupHtml = `<b style="color:#fff">${link.label}</b><br><span style="color:rgba(255,255,255,0.6)">${link.latest.name}<br>📍 ${link.latest.lat.toFixed(4)}, ${link.latest.lng.toFixed(4)}<br>🕐 ${new Date(link.latest.timestamp).toLocaleTimeString()}${zonesHere?'<br>📍 '+zonesHere:''}</span>`;
        if (markers[link.id]) { markers[link.id].setLatLng([link.latest.lat,link.latest.lng]); markers[link.id].setPopupContent(popupHtml); }
        else { const m = L.circleMarker([link.latest.lat,link.latest.lng], { radius:12, fillColor:color, color:'rgba(255,255,255,0.3)', weight:2, opacity:1, fillOpacity:0.9 }).addTo(map); m.bindPopup(popupHtml); markers[link.id]=m; }
        allPoints.push([link.latest.lat,link.latest.lng]);
      });
      if (allPoints.length>0 && Object.keys(zoneCircles).length===0) map.fitBounds(allPoints, {padding:[50,50]});
    }

    if ('Notification' in window && Notification.permission==='default') Notification.requestPermission();
    applyLang();
    loadLinks(); loadZones(); loadEvents(); fetchLocations();
    setInterval(loadLinks,10000);
    setInterval(fetchLocations,5000);
    setInterval(loadZones,15000);
    setInterval(loadEvents,5000);
  </script>
</body>
</html>
