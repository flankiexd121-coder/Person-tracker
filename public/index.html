<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title id="pageTitle">Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.7 } }
    @keyframes bounceIn { 0% { transform:scale(0);opacity:0 } 50% { transform:scale(1.1) } 100% { transform:scale(1);opacity:1 } }
    html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a0a0f; color:#f0f0f5; }
    #map { height:45vh; width:100%; z-index:0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .container { max-width:600px; margin:0 auto; padding:12px 16px; }
    .row { display:flex; gap:8px; margin:8px 0; }
    .row input { flex:1; padding:10px 14px; border:1px solid rgba(255,255,255,0.08); border-radius:10px; font-size:14px; background:rgba(255,255,255,0.04); color:#f0f0f5; outline:none; transition:all 0.2s; }
    .row input:focus { border-color:#007aff; background:rgba(0,122,255,0.06); }
    .row input::placeholder { color:rgba(255,255,255,0.2); }
    .row button { padding:10px 16px; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .row button:active { transform:scale(0.96); }
    .btn-primary { background:linear-gradient(135deg,#007aff,#5856d6); color:white; box-shadow:0 4px 15px rgba(0,122,255,0.25); }
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
    .header h1 { font-size:24px; font-weight:700; background:linear-gradient(135deg,#f0f0f5,#007aff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .lang-select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#f0f0f5; padding:5px 8px; border-radius:8px; font-size:12px; cursor:pointer; outline:none; }
    .tabs { display:flex; gap:3px; margin:10px 0; background:rgba(255,255,255,0.03); border-radius:10px; padding:3px; }
    .tab { flex:1; text-align:center; padding:8px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; color:rgba(255,255,255,0.35); transition:all 0.3s; }
    .tab.active { background:rgba(0,122,255,0.12); color:#007aff; font-weight:600; }
    .card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:14px; margin:8px 0; animation:fadeIn 0.3s ease; }
    .link-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03); animation:fadeIn 0.3s ease; }
    .link-item:last-child { border-bottom:none; }
    .link-label { font-weight:600; font-size:13px; display:flex; align-items:center; gap:8px; }
    .link-url { font-size:10px; color:rgba(255,255,255,0.25); word-break:break-all; margin-top:2px; }
    .link-status { font-size:11px; margin-top:4px; color:rgba(255,255,255,0.4); }
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; animation:pulse 2s infinite; flex-shrink:0; }
    .zone-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
    .zone-item:last-child { border-bottom:none; }
    .event-item { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:12px; animation:fadeIn 0.3s ease; }
    .event-item:last-child { border-bottom:none; }
    .event-enter { color:#34c759; }
    .event-exit { color:#ff3b30; }
    .tag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:500; margin-right:4px; background:rgba(52,199,89,0.1); color:#34c759; border:1px solid rgba(52,199,89,0.15); }
    .actions { display:flex; gap:4px; }
    .copy-btn, .share-btn { border:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; }
    .copy-btn { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); }
    .share-btn { background:rgba(0,122,255,0.12); color:#007aff; }
    .dlt-btn { background:none; border:none; color:rgba(255,255,255,0.15); font-size:18px; cursor:pointer; }
    .empty-state { color:rgba(255,255,255,0.15); text-align:center; padding:24px 0; font-size:13px; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(30,30,40,0.95); backdrop-filter:blur(20px); color:white; padding:12px 24px; border-radius:12px; font-size:13px; opacity:0; transition:opacity 0.4s; pointer-events:none; z-index:9999; border:1px solid rgba(255,255,255,0.06); white-space:nowrap; }
    .toast.show { opacity:1; }
    .notif-badge { position:fixed; top:12px; right:12px; background:#ff3b30; color:white; border-radius:50%; min-width:22px; height:22px; font-size:11px; font-weight:700; display:none; align-items:center; justify-content:center; z-index:1000; padding:0 6px; box-shadow:0 4px 15px rgba(255,59,48,0.3); animation:bounceIn 0.3s ease; }
    .slider-group { display:flex; align-items:center; gap:10px; margin-top:6px; }
    .slider-group span { font-size:12px; color:rgba(255,255,255,0.4); }
    input[type="range"] { -webkit-appearance:none; flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.08); outline:none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#007aff; cursor:pointer; box-shadow:0 2px 8px rgba(0,122,255,0.3); }
    .hint { font-size:12px; color:rgba(255,255,255,0.25); margin-bottom:8px; }
    /* Search bar */
    .search-wrap { position:absolute; top:10px; left:10px; right:10px; z-index:1000; display:flex; gap:6px; }
    .search-wrap input { flex:1; padding:9px 12px; border:1px solid rgba(255,255,255,0.12); border-radius:8px; font-size:13px; background:rgba(20,20,30,0.9); backdrop-filter:blur(15px); color:#f0f0f5; outline:none; }
    .search-wrap input:focus { border-color:#007aff; }
    .search-wrap input::placeholder { color:rgba(255,255,255,0.3); }
    .search-wrap button { padding:9px 12px; border:none; border-radius:8px; background:rgba(0,122,255,0.2); color:#007aff; font-size:15px; cursor:pointer; }
    .search-results { position:absolute; top:100%; left:0; right:0; margin-top:4px; background:rgba(20,20,30,0.95); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.08); border-radius:8px; display:none; max-height:180px; overflow-y:auto; }
    .search-results div { padding:8px 12px; font-size:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.03); }
    .search-results div:last-child { border-bottom:none; }
    .search-results div:hover { background:rgba(0,122,255,0.1); }
    .search-results.show { display:block; }
    .map-wrap { position:relative; }
  </style>
</head>
<body>
  <div class="map-wrap" id="mapWrap">
    <div id="map"></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search city..." autocomplete="off" />
      <button onclick="searchPlace()">🔍</button>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
  <div class="container">
    <div class="header">
      <h1 id="title">Tracker</h1>
      <select class="lang-select" id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="nl">Nederlands</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="it">Italiano</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="ar">العربية</option>
        <option value="tr">Türkçe</option>
        <option value="pl">Polski</option>
        <option value="sv">Svenska</option>
        <option value="da">Dansk</option>
        <option value="fi">Suomi</option>
        <option value="nb">Norsk</option>
        <option value="ko">한국어</option>
        <option value="hi">हिन्दी</option>
        <option value="th">ไทย</option>
        <option value="vi">Tiếng Việt</option>
        <option value="ro">Română</option>
        <option value="cs">Čeština</option>
        <option value="el">Ελληνικά</option>
        <option value="hu">Magyar</option>
      </select>
    </div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="people" id="tabLblPeople">People</div>
      <div class="tab" data-tab="zones" id="tabLblZones">Zones</div>
      <div class="tab" data-tab="events" id="tabLblActivity">Activity</div>
    </div>
    <div id="tab-people">
      <div class="card">
        <div class="row">
          <input type="text" id="labelInput" placeholder="Name (Mom, John...)" />
          <button class="btn-primary" onclick="createLink()" id="btnAddLink">+ Link</button>
        </div>
      </div>
      <div class="card" id="linksContainer"><div class="empty-state" id="emptyLinks">No links yet</div></div>
    </div>
    <div id="tab-zones" style="display:none">
      <div class="card">
        <div class="hint" id="zoneHint">Click the map to place a zone</div>
        <div class="row">
          <input type="text" id="zoneNameInput" placeholder="Zone name (Home, Work...)" />
          <button class="btn-primary" onclick="createZone()" id="btnAddZone">+ Zone</button>
        </div>
        <div class="slider-group">
          <span id="lblRadius">Radius</span>
          <input type="range" id="zoneRadius" min="20" max="500" value="100" oninput="document.getElementById('zrDisplay').textContent=this.value+'m'">
          <span id="zrDisplay" style="min-width:40px;text-align:right">100m</span>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:6px;text-align:center" id="zoneCoords"></div>
      </div>
      <div class="card" id="zonesContainer"><div class="empty-state" id="emptyZones">No zones yet</div></div>
    </div>
    <div id="tab-events" style="display:none">
      <div class="card" id="eventsContainer"><div class="empty-state" id="emptyEvents">No activity yet</div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="notif-badge" id="notifBadge">0</div>
  <script>
    const LANG = {

      fr: { title:'Tracker', tabPeople:'Personnes', tabZones:'Zones', tabActivity:'Activité', namePH:'Nom (Maman, Jean...)', addLink:'+ Lien', emptyLinks:'Aucun lien', zoneHint:'Cliquez sur la carte', zonePH:'Nom (Maison, Travail...)', addZone:'+ Zone', radius:'Rayon', emptyZones:'Aucune zone', emptyEvents:'Aucune activité', copied:'Copié ✓', zoneCreated:'Zone créée ✓', linkCreated:'Lien créé ✓', clickMapName:'Cliquez sur la carte', waiting:'attente...', entered:'arrivé à', left:'parti de', deleteZone:'Supprimer la zone ?', deleteLink:'Supprimer le lien ?', searchPH:'Rechercher ville...', noResults:'Aucun résultat' },
      de: { title:'Tracker', tabPeople:'Personen', tabZones:'Zonen', tabActivity:'Aktivität', namePH:'Name (Mama, Hans...)', addLink:'+ Link', emptyLinks:'Keine Links', zoneHint:'Klicke auf die Karte', zonePH:'Zonenname (Zuhause, Arbeit...)', addZone:'+ Zone', radius:'Radius', emptyZones:'Keine Zonen', emptyEvents:'Keine Aktivität', copied:'Kopiert ✓', zoneCreated:'Zone erstellt ✓', linkCreated:'Link erstellt ✓', clickMapName:'Klicke auf die Karte', waiting:'warte...', entered:'angekommen bei', left:'verlassen von', deleteZone:'Zone löschen?', deleteLink:'Link löschen?', searchPH:'Stadt suchen...', noResults:'Keine Ergebnisse' },
      it: { title:'Tracker', tabPeople:'Persone', tabZones:'Zone', tabActivity:'Attività', namePH:'Nome (Mamma, Giovanni...)', addLink:'+ Link', emptyLinks:'Nessun link', zoneHint:'Clicca sulla mappa', zonePH:'Nome zona (Casa, Lavoro...)', addZone:'+ Zona', radius:'Raggio', emptyZones:'Nessuna zona', emptyEvents:'Nessuna attività', copied:'Copiato ✓', zoneCreated:'Zona creata ✓', linkCreated:'Link creato ✓', clickMapName:'Clicca sulla mappa', waiting:'in attesa...', entered:'arrivato a', left:'partito da', deleteZone:'Eliminare zona?', deleteLink:'Eliminare link?', searchPH:'Cerca città...', noResults:'Nessun risultato' },
      pt: { title:'Tracker', tabPeople:'Pessoas', tabZones:'Zonas', tabActivity:'Atividade', namePH:'Nome (Mãe, João...)', addLink:'+ Link', emptyLinks:'Sem links', zoneHint:'Clique no mapa', zonePH:'Nome (Casa, Trabalho...)', addZone:'+ Zona', radius:'Raio', emptyZones:'Sem zonas', emptyEvents:'Sem atividade', copied:'Copiado ✓', zoneCreated:'Zona criada ✓', linkCreated:'Link criado ✓', clickMapName:'Clique no mapa', waiting:'aguardando...', entered:'chegou em', left:'saiu de', deleteZone:'Excluir zona?', deleteLink:'Excluir link?', searchPH:'Buscar cidade...', noResults:'Sem resultados' },
      ja: { title:'トラッカー', tabPeople:'人物', tabZones:'ゾーン', tabActivity:'アクティビティ', namePH:'名前（ママ、ジョン...）', addLink:'+ リンク', emptyLinks:'リンクがありません', zoneHint:'マップをクリック', zonePH:'ゾーン名（自宅、仕事...）', addZone:'+ ゾーン', radius:'半径', emptyZones:'ゾーンがありません', emptyEvents:'アクティビティがありません', copied:'コピーしました ✓', zoneCreated:'ゾーンを作成しました ✓', linkCreated:'リンクを作成しました ✓', clickMapName:'マップをクリック', waiting:'待機中...', entered:'に到着', left:'から出発', deleteZone:'削除しますか？', deleteLink:'削除しますか？', searchPH:'都市を検索...', noResults:'結果がありません' },
      zh: { title:'追踪器', tabPeople:'人员', tabZones:'区域', tabActivity:'活动', namePH:'姓名（妈妈、约翰...）', addLink:'+ 链接', emptyLinks:'暂无链接', zoneHint:'点击地图', zonePH:'名称（家、工作...）', addZone:'+ 区域', radius:'半径', emptyZones:'暂无区域', emptyEvents:'暂无活动', copied:'已复制 ✓', zoneCreated:'已创建 ✓', linkCreated:'已创建 ✓', clickMapName:'点击地图', waiting:'等待中...', entered:'到达', left:'离开', deleteZone:'删除？', deleteLink:'删除？', searchPH:'搜索城市...', noResults:'无结果' },
      ar: { title:'المتعقب', tabPeople:'الأشخاص', tabZones:'المناطق', tabActivity:'النشاط', namePH:'الاسم (أمي، جون...)', addLink:'+ رابط', emptyLinks:'لا توجد روابط', zoneHint:'انقر على الخريطة', zonePH:'اسم المنطقة (منزل...)', addZone:'+ منطقة', radius:'نصف القطر', emptyZones:'لا توجد مناطق', emptyEvents:'لا يوجد نشاط', copied:'تم النسخ ✓', zoneCreated:'تم إنشاء المنطقة ✓', linkCreated:'تم إنشاء الرابط ✓', clickMapName:'انقر على الخريطة', waiting:'انتظار...', entered:'وصل إلى', left:'غادر', deleteZone:'حذف؟', deleteLink:'حذف؟', searchPH:'بحث عن مدينة...', noResults:'لا توجد نتائج' },
      tr: { title:'Takipçi', tabPeople:'Kişiler', tabZones:'Bölgeler', tabActivity:'Aktivite', namePH:'İsim (Anne, Ahmet...)', addLink:'+ Link', emptyLinks:'Link yok', zoneHint:'Haritaya tıklayın', zonePH:'Bölge adı (Ev, İş...)', addZone:'+ Bölge', radius:'Yarıçap', emptyZones:'Bölge yok', emptyEvents:'Aktivite yok', copied:'Kopyalandı ✓', zoneCreated:'Bölge oluşturuldu ✓', linkCreated:'Link oluşturuldu ✓', clickMapName:'Haritaya tıklayın', waiting:'bekleniyor...', entered:'geldi', left:'ayrıldı', deleteZone:'Sil?', deleteLink:'Sil?', searchPH:'Şehir ara...', noResults:'Sonuç yok' },
      ru: { title:'Трекер', tabPeople:'Люди', tabZones:'Зоны', tabActivity:'Активность', namePH:'Имя (Мама, Джон...)', addLink:'+ Ссылка', emptyLinks:'Нет ссылок', zoneHint:'Нажмите на карту', zonePH:'Название (Дом, Работа...)', addZone:'+ Зона', radius:'Радиус', emptyZones:'Нет зон', emptyEvents:'Нет активности', copied:'Скопировано ✓', zoneCreated:'Зона создана ✓', linkCreated:'Ссылка создана ✓', clickMapName:'Нажмите на карту', waiting:'ожидание...', entered:'прибыл в', left:'покинул', deleteZone:'Удалить?', deleteLink:'Удалить?', searchPH:'Поиск города...', noResults:'Нет результатов' }
    };
    let cl = localStorage.getItem('tl') || 'en';
    if (!LANG[cl]) cl = 'en';
    function t(k) { return LANG[cl]?.[k] || LANG.en[k] || k; }
    function setLang(c) { cl = c; localStorage.setItem('tl', c); document.documentElement.lang = c; applyLang(); }
    function applyLang() {
      const m = { title:'title', tabLblPeople:'tabPeople', tabLblZones:'tabZones', tabLblActivity:'tabActivity',
        labelInput:'namePH', btnAddLink:'addLink', emptyLinks:'emptyLinks', zoneHint:'zoneHint',
        zoneNameInput:'zonePH', btnAddZone:'addZone', lblRadius:'radius', emptyZones:'emptyZones',
        emptyEvents:'emptyEvents', searchInput:'searchPH' };
      for (const [id,k] of Object.entries(m)) {
        const e = document.getElementById(id);
        if (e && e.tagName==='INPUT') e.placeholder = t(k);
        else if (e) e.textContent = t(k);
      }
    }
    document.getElementById('langSelect').value = cl;

    const map = L.map('map', { tap: false, zoomControl: true }).setView([40, -100], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    const colors = ['#007aff','#34c759','#ff9500','#ff2d55','#5856d6','#ff6482','#30d158','#64d2ff','#ffd60a','#bf5af2'];
    const markers = {}, zoneCircles = {};
    let pendingZonePos = null, eventCount = 0;

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display='none');
        document.getElementById('tab-'+tab.dataset.tab).style.display='block';
        if (tab.dataset.tab==='events') { document.getElementById('notifBadge').style.display='none'; eventCount=0; }
      });
    });
    function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
    map.on('click', e => { document.querySelector('.tab[data-tab="zones"]').click(); pendingZonePos=e.latlng; document.getElementById('zoneCoords').textContent=`${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`; });
    async function createLink() {
      const label=document.getElementById('labelInput').value.trim()||'Untitled';
      const r=await fetch('/api/create-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({label})});
      const d=await r.json(); document.getElementById('labelInput').value=''; toast(t('linkCreated')); loadLinks();
      if (navigator.share&&d.url) try{await navigator.share({title:'Share location',text:'Open this to share your location',url:d.url});}catch(_){}
    }
    async function createZone() {
      const n=document.getElementById('zoneNameInput').value.trim();
      if(!n||!pendingZonePos){toast(t('clickMapName'));return;}
      await fetch('/api/zones',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,lat:pendingZonePos.lat,lng:pendingZonePos.lng,radius:parseInt(document.getElementById('zoneRadius').value)})});
      toast(t('zoneCreated')); document.getElementById('zoneNameInput').value=''; document.getElementById('zoneCoords').textContent=''; pendingZonePos=null; loadZones();
    }
    async function deleteZone(id){if(!confirm(t('deleteZone')))return;await fetch('/api/zones/'+id,{method:'DELETE'});if(zoneCircles[id]){map.removeLayer(zoneCircles[id]);delete zoneCircles[id];}loadZones();}
    async function deleteLink(id){if(!confirm(t('deleteLink')))return;await fetch('/api/links/'+id,{method:'DELETE'});if(markers[id]){map.removeLayer(markers[id]);delete markers[id];}loadLinks();}
    function copyLink(u){if(navigator.clipboard){navigator.clipboard.writeText(u);toast(t('copied'));}}
    function shareLink(u){if(navigator.share)navigator.share({title:'Share location',text:'Open this to share your location',url:u});else copyLink(u);}
    async function loadLinks() {
      const r=await fetch('/api/links'),links=await r.json();
      const c=document.getElementById('linksContainer');
      if(links.length===0){c.innerHTML=`<div class="empty-state">${t('emptyLinks')}</div>`;return;}
      c.innerHTML=links.map((l,i)=>{
        const co=colors[i%colors.length];
        const zh=(l.insideZones||[]).map(zid=>{const z=window._z?.find(zz=>zz.id===zid);return z?`<span class="tag">${z.name}</span>`:'';}).join('');
        const live=l.latest&&(Date.now()-new Date(l.latest.timestamp).getTime()<60000);
        return `<div class="link-item"><div style="flex:1;min-width:0"><div class="link-label"><span class="status-dot" style="background:${co}"></span>${l.label}</div><div class="link-url">${window.location.origin}/track/${l.id}</div><div class="link-status">${l.latest?`${live?'<span style="color:#34c759">●</span>':'<span style="color:rgba(255,255,255,0.15)">○</span>'} ${l.latest.name} · ${new Date(l.latest.timestamp).toLocaleTimeString()} ${zh}`:t('waiting')}</div></div><div class="actions"><button class="copy-btn" onclick="copyLink('${window.location.origin}/track/${l.id}')">Copy</button><button class="share-btn" onclick="shareLink('${window.location.origin}/track/${l.id}')">Share</button><button class="dlt-btn" onclick="deleteLink('${l.id}')">×</button></div></div>`;
      }).join('');
    }
    async function loadZones(){
      const r=await fetch('/api/zones'),zones=await r.json(); window._z=zones;
      Object.values(zoneCircles).forEach(c=>map.removeLayer(c));Object.keys(zoneCircles).forEach(k=>delete zoneCircles[k]);
      zones.forEach(z=>{const c=L.circle([z.lat,z.lng],{radius:z.radius,color:'rgba(0,122,255,0.4)',fillColor:'rgba(0,122,255,0.08)',fillOpacity:1,weight:2}).addTo(map);c.bindPopup(`<b style="color:#fff">${z.name}</b><br><span style="color:rgba(255,255,255,0.5)">${z.radius}m</span>`);L.marker([z.lat,z.lng],{icon:L.divIcon({html:`<div style="background:rgba(0,122,255,0.15);color:#007aff;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600;white-space:nowrap;backdrop-filter:blur(10px);border:1px solid rgba(0,122,255,0.2)">${z.name}</div>`,className:'',iconSize:[0,0]})}).addTo(map);zoneCircles[z.id]=c;});
      document.getElementById('zonesContainer').innerHTML=zones.length===0?`<div class="empty-state">${t('emptyZones')}</div>`:zones.map(z=>`<div class="zone-item"><div><span style="font-weight:600">${z.name}</span><br><span style="font-size:11px;color:rgba(255,255,255,0.25)">${z.lat.toFixed(5)}, ${z.lng.toFixed(5)} · ${z.radius}m</span></div><button class="dlt-btn" onclick="deleteZone('${z.id}')">×</button></div>`).join('');
    }
    async function loadEvents(){
      const r=await fetch('/api/events'),events=await r.json();
      const c=document.getElementById('eventsContainer');
      if(events.length===0){c.innerHTML=`<div class="empty-state">${t('emptyEvents')}</div>`;return;}
      const ne=events.filter(e=>e.timestamp>(window._let||'0'));
      if(ne.length>0){eventCount+=ne.length;document.getElementById('notifBadge').textContent=eventCount;document.getElementById('notifBadge').style.display='flex';
        const lt=ne[0];toast(`${lt.type==='enter'?'📍':'🚶'} ${lt.personName} ${lt.type==='enter'?t('entered'):t('left')} "${lt.zoneName}"`);
        if('Notification' in window&&Notification.permission==='granted')new Notification('Tracker',{body:`${lt.personName} ${lt.type==='enter'?t('entered'):t('left')} ${lt.zoneName}`});}
      window._let=events[0]?.timestamp;
      c.innerHTML=events.map(e=>`<div class="event-item ${e.type==='enter'?'event-enter':'event-exit'}"><strong>${e.type==='enter'?'📍 ':'🚶 '}${e.personName}</strong> ${e.type==='enter'?t('entered'):t('left')} <strong>${e.zoneName}</strong><br><span style="color:rgba(255,255,255,0.15);font-size:10px">${new Date(e.timestamp).toLocaleString()}</span></div>`).join('');
    }
    async function fetchLocations(){
      const r=await fetch('/api/links'),links=await r.json();const ap=[];
      links.forEach((l,i)=>{if(!l.latest)return;const co=colors[i%colors.length];const pop=`<b style="color:#fff">${l.label}</b><br><span style="color:rgba(255,255,255,0.6)">${l.latest.name}<br>📍 ${l.latest.lat.toFixed(4)}, ${l.latest.lng.toFixed(4)}<br>🕐 ${new Date(l.latest.timestamp).toLocaleTimeString()}</span>`;if(markers[l.id]){markers[l.id].setLatLng([l.latest.lat,l.latest.lng]);markers[l.id].setPopupContent(pop);}else{const m=L.circleMarker([l.latest.lat,l.latest.lng],{radius:12,fillColor:co,color:'rgba(255,255,255,0.3)',weight:2,opacity:1,fillOpacity:0.9}).addTo(map);m.bindPopup(pop);markers[l.id]=m;}ap.push([l.latest.lat,l.latest.lng]);});
      if(ap.length>0&&Object.keys(zoneCircles).length===0)map.fitBounds(ap,{padding:[50,50]});
    }
    // Search
    let st;const si=document.getElementById('searchInput');
    si.addEventListener('input',()=>{clearTimeout(st);const q=si.value.trim();if(q.length<2){document.getElementById('searchResults').classList.remove('show');return;}st=setTimeout(()=>searchPlace(q),400);});
    si.addEventListener('keydown',e=>{if(e.key==='Enter')searchPlace();});
    async function searchPlace(q){q=q||si.value.trim();if(q.length<2)return;try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`);const d=await r.json();const b=document.getElementById('searchResults');b.innerHTML='';if(d.length===0){b.innerHTML=`<div style="color:rgba(255,255,255,0.3)">${t('noResults')}</div>`;b.classList.add('show');return;}d.forEach(p=>{const el=document.createElement('div');el.textContent=p.display_name.split(', ').slice(0,3).join(', ');el.addEventListener('click',()=>{si.value=el.textContent;b.classList.remove('show');map.flyTo([parseFloat(p.lat),parseFloat(p.lon)],13);L.circleMarker([parseFloat(p.lat),parseFloat(p.lon)],{radius:8,color:'#007aff',fillColor:'#007aff',fillOpacity:0.5,weight:2}).addTo(map).bindPopup(`<b>${el.textContent}</b>`).openPopup();});b.appendChild(el);});b.classList.add('show');}catch(e){console.error(e);}}
    document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('searchResults').classList.remove('show');});
    if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
    applyLang();loadLinks();loadZones();loadEvents();fetchLocations();
    setInterval(loadLinks,10000);setInterval(fetchLocations,5000);setInterval(loadZones,15000);setInterval(loadEvents,5000);
  </script>
</body>
</html>
